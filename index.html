<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加微信</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 28px;
            text-align: center;
            max-width: 340px;
            width: 100%;
        }
        .avatar {
            width: 80px; height: 80px;
            background: #07c160;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
        }
        h2 { margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 24px; }
        .qrcode-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .qrcode-box img {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
        }
        .qrcode-tip {
            margin-top: 12px;
            color: #666;
            font-size: 13px;
        }
        .tips {
            margin-top: 20px;
            font-size: 12px;
            color: #d48806;
            background: #fffbe6;
            padding: 12px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">💬</div>
        <h2>添加微信</h2>
        <p class="subtitle">长按识别二维码，或截图保存到相册识别</p>
        
        <div class="qrcode-box">
            <img src="wechat-qr.jpg" alt="微信二维码">
            <p class="qrcode-tip">↑ 长按识别二维码 ↑</p>
        </div>
        
        <div class="tips">
            💡 提示：截图保存二维码 → 打开微信 → 扫一扫 → 选择相册中的二维码
        </div>
    </div>
</body>
</html>
